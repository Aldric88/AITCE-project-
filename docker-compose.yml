version: "3.9"

services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      MONGO_URI: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads:/app/uploads
    depends_on:
      - mongo
      - redis
    networks:
      - internal
      - web

  frontend:
    build: ./notes-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - web

volumes:
  mongo_data:
  redis_data:
  uploads:

networks:
  internal:
  web:
