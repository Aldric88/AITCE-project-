name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      JWT_SECRET_KEY: ci-secret-key
      APP_ENV: test
      MONGO_URI: mongodb://localhost:27017
      DB_NAME: notes_platform_ci
      MONGO_SERVER_SELECTION_TIMEOUT_MS: "1500"
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      JWT_COOKIE_NAME: access_token
      REFRESH_COOKIE_NAME: refresh_token
      JWT_COOKIE_SECURE: "false"
      JWT_COOKIE_SAMESITE: lax
      REDIS_URL: redis://localhost:6379/0
      CACHE_DEFAULT_TTL_SECONDS: "60"
      LOG_JSON: "true"
      SLOW_QUERY_THRESHOLD_MS: "250"
      AI_JOB_MAX_ATTEMPTS: "3"
      ENABLE_SECURITY_HEADERS: "true"
      MODERATION_AI_MODE: rules
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit

      - name: Validate Environment Contract
        run: python scripts/validate_env.py

      - name: API Contract Tests
        run: pytest -q tests/test_openapi_contract.py tests/test_route_compatibility_contracts.py

      - name: Run tests
        run: pytest -q

      - name: Security scan
        run: bandit -q -r app

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notes-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: notes-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
